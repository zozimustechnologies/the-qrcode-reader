<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d7ea6"/>
      <stop offset="100%" stop-color="#1a4a6e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" rx="12" fill="url(#bgGrad)"/>

  <!-- QR icon (small, left side) -->
  <g transform="translate(40, 60)">
    <rect width="160" height="160" rx="20" fill="rgba(255,255,255,0.12)"/>
    <!-- Top-left finder -->
    <rect x="16" y="16" width="40" height="40" rx="6" fill="#ffffff"/>
    <rect x="22" y="22" width="28" height="28" rx="4" fill="url(#bgGrad)"/>
    <rect x="29" y="29" width="14" height="14" rx="2" fill="#ffffff"/>
    <!-- Top-right finder -->
    <rect x="104" y="16" width="40" height="40" rx="6" fill="#ffffff"/>
    <rect x="110" y="22" width="28" height="28" rx="4" fill="url(#bgGrad)"/>
    <rect x="117" y="29" width="14" height="14" rx="2" fill="#ffffff"/>
    <!-- Bottom-left finder -->
    <rect x="16" y="104" width="40" height="40" rx="6" fill="#ffffff"/>
    <rect x="22" y="110" width="28" height="28" rx="4" fill="url(#bgGrad)"/>
    <rect x="29" y="117" width="14" height="14" rx="2" fill="#ffffff"/>
    <!-- Dots -->
    <rect x="70" y="20" width="12" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="70" y="40" width="12" height="12" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="70" y="70" width="12" height="12" rx="2" fill="rgba(255,255,255,0.8)"/>
    <rect x="90" y="70" width="12" height="12" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="70" y="90" width="12" height="12" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="90" y="90" width="12" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="110" y="70" width="12" height="12" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="110" y="90" width="12" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="70" y="120" width="12" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="90" y="120" width="12" height="12" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="110" y="110" width="12" height="12" rx="2" fill="rgba(255,255,255,0.8)"/>
    <rect x="130" y="110" width="12" height="12" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="110" y="130" width="12" height="12" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="130" y="130" width="12" height="12" rx="2" fill="rgba(255,255,255,0.7)"/>
    <!-- Scanner line -->
    <rect x="8" y="78" width="144" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Text (right side) -->
  <text x="240" y="112" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="#ffffff">QR Code</text>
  <text x="240" y="148" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Reader</text>
  <text x="240" y="185" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Scan QR codes instantly</text>
  <text x="240" y="205" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">from your browser</text>
</svg>
