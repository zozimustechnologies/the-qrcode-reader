<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d7ea6"/>
      <stop offset="100%" stop-color="#1a4a6e"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bgGrad)"/>

  <!-- Decorative background dots -->
  <g opacity="0.06">
    <rect x="50" y="50" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="90" y="50" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="50" y="90" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="1290" y="450" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="1330" y="450" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="1290" y="490" width="20" height="20" rx="3" fill="#ffffff"/>
    <rect x="1330" y="490" width="20" height="20" rx="3" fill="#ffffff"/>
  </g>

  <!-- Left section: QR Icon -->
  <g transform="translate(120, 100)">
    <rect width="360" height="360" rx="40" fill="url(#cardGrad)"/>
    <!-- Top-left finder -->
    <rect x="36" y="36" width="90" height="90" rx="14" fill="#ffffff"/>
    <rect x="48" y="48" width="66" height="66" rx="8" fill="url(#bgGrad)"/>
    <rect x="64" y="64" width="34" height="34" rx="4" fill="#ffffff"/>
    <!-- Top-right finder -->
    <rect x="234" y="36" width="90" height="90" rx="14" fill="#ffffff"/>
    <rect x="246" y="48" width="66" height="66" rx="8" fill="url(#bgGrad)"/>
    <rect x="262" y="64" width="34" height="34" rx="4" fill="#ffffff"/>
    <!-- Bottom-left finder -->
    <rect x="36" y="234" width="90" height="90" rx="14" fill="#ffffff"/>
    <rect x="48" y="246" width="66" height="66" rx="8" fill="url(#bgGrad)"/>
    <rect x="64" y="262" width="34" height="34" rx="4" fill="#ffffff"/>
    <!-- Data dots -->
    <rect x="156" y="44" width="26" height="26" rx="4" fill="rgba(255,255,255,0.85)"/>
    <rect x="156" y="84" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="192" y="44" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="44" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.85)"/>
    <rect x="84" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="44" y="192" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="156" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.9)"/>
    <rect x="192" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="156" y="192" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="192" y="192" width="26" height="26" rx="4" fill="rgba(255,255,255,0.7)"/>
    <rect x="250" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="290" y="156" width="26" height="26" rx="4" fill="rgba(255,255,255,0.85)"/>
    <rect x="250" y="192" width="26" height="26" rx="4" fill="rgba(255,255,255,0.7)"/>
    <rect x="290" y="192" width="26" height="26" rx="4" fill="rgba(255,255,255,0.45)"/>
    <rect x="156" y="250" width="26" height="26" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="192" y="250" width="26" height="26" rx="4" fill="rgba(255,255,255,0.85)"/>
    <rect x="156" y="290" width="26" height="26" rx="4" fill="rgba(255,255,255,0.7)"/>
    <rect x="192" y="290" width="26" height="26" rx="4" fill="rgba(255,255,255,0.45)"/>
    <rect x="250" y="250" width="26" height="26" rx="4" fill="rgba(255,255,255,0.85)"/>
    <rect x="290" y="250" width="26" height="26" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="250" y="290" width="26" height="26" rx="4" fill="rgba(255,255,255,0.45)"/>
    <rect x="290" y="290" width="26" height="26" rx="4" fill="rgba(255,255,255,0.9)"/>
    <!-- Scanner line -->
    <rect x="20" y="176" width="320" height="4" rx="2" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Right section: Text -->
  <text x="580" y="200" font-family="'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="700" fill="#ffffff">QR Code Reader</text>
  <text x="580" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="26" fill="rgba(255,255,255,0.8)">Scan QR codes instantly using your camera or uploaded images.</text>
  <text x="580" y="318" font-family="'Segoe UI', Roboto, sans-serif" font-size="26" fill="rgba(255,255,255,0.8)">Fast, private, and completely free.</text>

  <!-- Feature pills -->
  <rect x="580" y="360" width="160" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="612" y="388" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#ffffff">&#x1F4F7;  Camera Scan</text>

  <rect x="760" y="360" width="150" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="792" y="388" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#ffffff">&#x1F4C1;  File Upload</text>

  <rect x="930" y="360" width="190" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="962" y="388" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#ffffff">&#x1F512;  100% Private</text>

  <!-- Footer text -->
  <text x="580" y="480" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="rgba(255,255,255,0.45)">By Zozimus Technologies</text>
</svg>
